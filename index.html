<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiny Notes Lab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>Tiny Notes Lab</h1>

    <!-- shown when signed out -->
    <section id="signed-out">
      <p class="auth-msg">Sign in to save and access your notes.</p>
      <button id="signin-btn" class="auth-btn">Sign In / Sign Up</button>
    </section>

    <!-- shown when signed in -->
    <section id="signed-in" hidden>
      <div id="auth-bar">
        <span id="user-label"></span>
        <button id="signout-btn">Sign Out</button>
      </div>

      <form id="note-form">
        <input id="note-input" type="text" placeholder="Write a note…" autocomplete="off" />
        <button type="submit">Add</button>
      </form>

      <!-- Single shared file input; programmatically clicked by the attach buttons. -->
      <input type="file" id="file-input">

      <p id="status" class="status"></p>
      <ul id="note-list"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
